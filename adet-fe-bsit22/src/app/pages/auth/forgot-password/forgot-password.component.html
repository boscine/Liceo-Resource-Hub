<div class="auth-centered-page">
  <header class="app-nav"><div class="nav-inner"><a class="nav-brand" routerLink="/">Liceo Resource Hub</a></div></header>
  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-icon"><span class="material-symbols-outlined">lock_reset</span></div>
      <h2>Reset Password</h2>
      <p>Enter your Liceo email and we'll send you a reset link valid for 15 minutes.</p>

      <div class="success-box" *ngIf="sent">
        <span class="material-symbols-outlined">mark_email_read</span>
        Reset link sent! Check your inbox at <strong>{{ email }}</strong>
      </div>

      <div class="error-box" *ngIf="error">
        <span class="material-symbols-outlined">error</span>{{ error }}
      </div>

      <form (ngSubmit)="onSubmit()" #fpForm="ngForm" *ngIf="!sent">
        <div class="field">
          <label class="field-label" for="email">University Email</label>
          <input class="input-academic" id="email" type="email"
            [(ngModel)]="email" name="email"
            placeholder="yourname@liceo.edu.ph" required/>
        </div>
        <button type="submit" class="btn-primary" [disabled]="loading || !fpForm.valid">
          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="!loading" class="material-symbols-outlined">send</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <div class="back-link"><a routerLink="/login">← Back to Login</a></div>
    </div>
  </main>
</div>
