<div class="verify-page">

  <div class="verify-card-wrap">
    <div class="verify-card">
      <header class="card-header">
        <span class="material-symbols-outlined" style="font-size: 48px; color: var(--primary); margin-bottom: 1.5rem; font-variation-settings: 'FILL' 1;">mark_email_read</span>
        <h2>Identify Yourself</h2>
        <p>A secure 6-digit access code has been dispatched to <strong>{{ email }}</strong>. Please authenticate to activate your student profile.</p>
      </header>
  
      <form (ngSubmit)="onSubmit()" class="verify-form">
        <div class="code-field">
          <input type="text" [(ngModel)]="code" name="code" class="v-input" maxlength="6" autofocus required />
        </div>
        
        <button type="submit" class="btn-primary" [disabled]="loading || code.length < 6">
          <span *ngIf="!loading">Verify Identity</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>
  
      <div class="resend-link">
        <span>Didn't receive the email?</span>
        <a (click)="resendCode()">Dispatch New Code</a>
        <div style="margin-top: 1rem; opacity: 0.6; font-size: 0.75rem;">
          Wrong email? <a routerLink="/register">Register again</a>
        </div>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
