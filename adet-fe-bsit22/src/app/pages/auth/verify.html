<div class="verify-page">
  <div class="verify-card">
    <div class="card-header">
      <span class="material-symbols-outlined" style="font-size: 48px; color: var(--primary); margin-bottom: 1rem;">mark_email_read</span>
      <h2>Check Your Inbox</h2>
      <p>We've sent a 6-digit verification code to <strong>{{ email }}</strong>. Please enter it below to activate your account.</p>
    </div>

    <div class="error-box" *ngIf="error">
      <span class="material-symbols-outlined">error</span>
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()">
      <input type="text" [(ngModel)]="code" name="code" class="v-input" placeholder="000000" maxlength="6" autofocus required />
      
      <button type="submit" class="btn-primary" [disabled]="loading || code.length < 6">
        <span *ngIf="!loading">Verify Account</span>
        <span *ngIf="!loading" class="material-symbols-outlined">verified</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="resend-link">
      <span>Didn't get the code?</span>
      <a routerLink="/register">Try Different Email</a>
    </div>
  </div>
</div>
