<header class="app-nav">
  <div class="nav-inner">

    <a class="nav-brand" routerLink="/">Liceo Resource Hub</a>

    <nav class="nav-links">
      <a routerLink="/feed"        [class.active]="active === 'feed'">Requests</a>
      <a routerLink="/post/create" [class.active]="active === 'create'">Create</a>
      <a routerLink="/admin"       [class.active]="active === 'admin'" *ngIf="isAdmin">Dashboard</a>
    </nav>

    <div class="nav-actions">

      <!-- Notification Bell -->
      <div class="notif-wrapper" (click)="$event.stopPropagation()">
        <button class="icon-btn notif-btn" (click)="toggleNotifications($event)" id="notif-bell">
          <span class="material-symbols-outlined">notifications</span>
          <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
        </button>

        <div class="notif-panel" *ngIf="notificationsOpen" id="notif-panel">
          <div class="notif-panel-header">
            <span class="notif-panel-title">Notifications</span>
            <button class="mark-all-btn" (click)="markAllRead()" *ngIf="unreadCount > 0">Mark all read</button>
          </div>

          <div class="notif-list">
            <div class="notif-item" *ngFor="let n of notifications"
                 [class.unread]="!n.read"
                 (click)="markRead(n)">
              <span class="notif-icon material-symbols-outlined">{{ n.icon }}</span>
              <div class="notif-body">
                <p class="notif-text" [innerHTML]="n.text"></p>
                <span class="notif-time">{{ n.time }}</span>
              </div>
              <span class="notif-dot" *ngIf="!n.read"></span>
            </div>
          </div>

          <div class="notif-panel-footer">
            <a routerLink="/notifications">View all notifications</a>
          </div>
        </div>
      </div>

      <!-- Avatar → Profile -->
      <button class="icon-btn avatar-btn" routerLink="/profile" id="nav-profile-btn"
              [class.active]="active === 'profile'">
        {{ user.display_name?.charAt(0)?.toUpperCase() || 'U' }}
      </button>

      <!-- Logout -->
      <button class="icon-btn logout-nav-btn" (click)="logout()" title="Logout" id="nav-logout-btn">
        <span class="material-symbols-outlined">logout</span>
      </button>

    </div>
  </div>
</header>
