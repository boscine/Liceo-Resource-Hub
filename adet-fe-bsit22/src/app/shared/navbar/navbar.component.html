<header class="app-nav">
  <div class="nav-inner" [class.has-menu-btn]="showMenuButton">
    <button class="nav-mobile-menu" (click)="toggleMenu()" *ngIf="showMenuButton">
      <span class="material-symbols-outlined">menu</span>
    </button>

    <a class="nav-brand" routerLink="/">
      <span class="full-brand">Liceo Resource Hub</span>
      <span class="mobile-brand">Liceo Hub</span>
    </a>

    <!-- Links removed as primary actions are now in quick navigation sidebars -->
    <div class="nav-links"></div>

    <div class="nav-actions">
      <button class="icon-btn" (click)="toggleHelp()" *ngIf="showHelpButton">
        <span class="material-symbols-outlined">help_outline</span>
      </button>

      <!-- Guest Actions -->
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login" class="nav-guest-link">Login</a>
        <a routerLink="/register" class="nav-btn-register">Register</a>
      </ng-container>

      <ng-container *ngIf="isLoggedIn">
        <!-- Notification Bell -->
        <div class="notif-wrapper" (click)="$event.stopPropagation()">
          <div class="notif-trigger-wrap" (click)="toggleNotifications($event)">
            <span class="material-symbols-outlined">notifications</span>
            <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
          </div>

          <div class="notif-panel" *ngIf="notificationsOpen" id="notif-panel">
            <div class="notif-panel-header">
              <span class="notif-panel-title">Notifications ({{ unreadCount }})</span>
              <button class="mark-all-btn" (click)="markAllRead()" *ngIf="unreadCount > 0">Mark all read</button>
            </div>

            <div class="notif-list">
              <div class="notif-item" *ngFor="let n of notifications"
                   [class.unread]="!n.read"
                   (click)="markRead(n)">
                <span class="notif-icon material-symbols-outlined">{{ n.icon }}</span>
                <div class="notif-body">
                  <p class="notif-text" [innerHTML]="n.text"></p>
                  <span class="notif-time">{{ n.time }}</span>
                </div>
                <span class="notif-dot" *ngIf="!n.read"></span>
              </div>
            </div>

            <div class="notif-panel-footer">
              <a routerLink="/notifications" (click)="closeNotificationsDeferred()">View all notifications</a>
            </div>
          </div>
        </div>

        <!-- Avatar → Profile -->
        <button class="icon-btn avatar-btn" routerLink="/profile" id="nav-profile-btn"
                [class.active]="active === 'profile'">
          {{ user.display_name?.charAt(0)?.toUpperCase() || user.displayName?.charAt(0)?.toUpperCase() || 'U' }}
        </button>

        <!-- Improved Logout -->
        <button class="logout-btn-premium" (click)="logout()" title="Secure Logout" id="nav-logout-btn">
          <span class="material-symbols-outlined">logout</span>
          Disconnect
        </button>
      </ng-container>
    </div>

    </div>
</header>
