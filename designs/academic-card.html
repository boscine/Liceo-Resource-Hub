<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Curator - Card Design</title>
    <link rel="stylesheet" href="academic-card.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Work+Sans:wght@100..900&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
</head>
<body>

    <div class="card-container">
        <!-- Academic Resource Card -->
        <article class="academic-card">
            <div class="card-header">
                <div class="category-badge">Textbook</div>
                <div class="status-indicator open">
                    <span class="status-dot pulse"></span>
                    Open
                </div>
            </div>

            <h2 class="card-title">Advanced Calculus: <em class="serif-italic">A Scholarly Edition</em></h2>
            <p class="card-description">A well-maintained reference for engineering students. Includes original lecture notes and institutional annotations.</p>

            <div class="card-footer">
                <div class="author-info">
                    <div class="avatar-small">JD</div>
                    <span class="author-name">John Doe</span>
                </div>
                <button class="btn-action">
                    View Details
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>
        </article>
    </div>

</body>
</html>
